  <text x="140" y="116" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6A8F7B" letter-spacing="1">SOBRE EL LIBRO</text>
  <text x="140" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" dy="0">"Treinta años de trabajo con</text>
  <text x="140" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">empresas que querían crecer</text>
