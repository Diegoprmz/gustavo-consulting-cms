  <text x="140" y="316" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="white" font-weight="700">Gustavo Martínez Pellón</text>
  <text x="140" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6A8F7B" letter-spacing="1">CONSULTOR ESTRATÉGICO</text>
